catalogMode: prefer

ignoreWorkspaceRootCheck: true
shellEmulator: true
trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
  - semver@6.3.1
packages:
  - playground
  - docs
  - packages/*
  - examples/*
  - website
catalog:
catalogs:
  cli:
    '@antfu/eslint-config': ^8.2.0
    '@antfu/ni': ^30.1.0
    bumpp: ^11.0.1
    eslint: ^10.2.1
    lint-staged: ^16.4.0
    publint: ^0.3.18
    simple-git-hooks: ^2.13.1
    tsdown: ^0.22.0
    tsx: ^4.21.0
    typescript: ^6.0.3
    vite: ^8.0.9
  env:
    dotenv: ^17.4.2
  iconify:
    '@iconify-json/hugeicons': ^1.2.28
    '@iconify-json/lucide': ^1.2.0
  inlined:
    '@antfu/utils': ^9.3.0
    es-toolkit: ^1.46.1
  schema:
    zod: ^4.4.3
  testing:
    tsdown-stale-guard: ^0.1.1
    tsnapi: ^0.3.2
    vitest: ^4.1.5
  types:
    '@types/node': ^25.6.0
  website:
    nuxt: ^4.4.6
    shadcn-docs-nuxt: ^1.2.2
    vue: ^3.5.34
    vue-router: ^5.0.7
onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks
